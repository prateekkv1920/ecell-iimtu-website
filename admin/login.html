<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login — E-Cell IIMTU</title>
    <link rel="stylesheet" href="../styles.css" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--navy);
        }

        .login-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 20%, rgba(74, 123, 157, 0.1) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255, 107, 53, 0.05) 0%, transparent 70%);
        }

        .login-grid {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
        }

        .login-card {
            background: var(--navy-700);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-xl);
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
            box-shadow: var(--shadow-lg), var(--shadow-glow);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo-icon {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 20px rgba(74, 123, 157, 0.6));
        }

        .login-logo-text {
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 1.5rem;
        }

        .login-logo-sub {
            font-size: 0.75rem;
            color: var(--orange);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 600;
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(255, 107, 53, 0.1);
            border: 1px solid rgba(255, 107, 53, 0.25);
            border-radius: 999px;
            padding: 0.25rem 0.75rem;
            font-size: 0.7rem;
            color: var(--orange);
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .pass-wrap {
            position: relative;
        }

        .pass-toggle {
            position: absolute;
            right: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            color: var(--gray-400);
            font-size: 1rem;
            cursor: pointer;
            transition: color var(--transition);
        }

        .pass-toggle:hover {
            color: var(--white);
        }

        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--gray-400);
        }

        .login-footer a {
            color: var(--steel-light);
            transition: color var(--transition);
        }

        .login-footer a:hover {
            color: var(--white);
        }
    </style>
</head>

<body>
    <div class="login-bg"></div>
    <div class="login-grid"></div>
    <div class="login-card animate-fadeInUp">
        <div class="login-logo">
            <span class="login-logo-icon">⚡</span>
            <div class="login-logo-text">E-Cell IIMTU</div>
            <div class="login-logo-sub">Admin Portal</div>
        </div>
        <div style="text-align:center;margin-bottom:1.75rem;">
            <div class="admin-badge">🔒 Restricted Access</div>
            <p style="font-size:0.85rem;color:var(--gray-400);">Only authorized administrators can log in</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Admin Email</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="ecell@iimtindia.net"
                    value="ecell@iimtindia.net" required />
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="pass-wrap">
                    <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password"
                        required />
                    <button type="button" class="pass-toggle" id="passToggle" onclick="togglePass()">👁</button>
                </div>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
                <label
                    style="display:flex;align-items:center;gap:0.5rem;font-size:0.8rem;color:var(--gray-400);cursor:pointer;">
                    <input type="checkbox" style="accent-color:var(--orange);" /> Remember me
                </label>
                <a href="#" style="font-size:0.8rem;color:var(--steel-light);">Forgot password?</a>
            </div>
            <button type="submit" class="btn btn-primary w-full btn-lg" id="loginBtn">Login to Admin Panel ⚡</button>
        </form>
        <div class="login-footer">
            <a href="../index.html">← Back to E-Cell IIMTU Website</a>
        </div>
    </div>
    <div class="toast-container"></div>
    <script src="../app.js"></script>
    <script>
        function togglePass() {
            const inp = document.getElementById('loginPassword');
            inp.type = inp.type === 'password' ? 'text' : 'password';
        }
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            btn.disabled = true;
            btn.textContent = 'Authenticating...';
            await new Promise(r => setTimeout(r, 1200));
            // Demo auth — in production use Supabase Auth
            if (email === 'ecell@iimtindia.net' && pass.length >= 6) {
                localStorage.setItem('ecell-admin-auth', JSON.stringify({ email, time: Date.now() }));
                showToast('Login successful! Redirecting...', 'success');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
            } else {
                showToast('Invalid credentials. Please try again.', 'error');
                btn.disabled = false;
                btn.textContent = 'Login to Admin Panel ⚡';
            }
        });
        // If already logged in, redirect
        const auth = JSON.parse(localStorage.getItem('ecell-admin-auth') || 'null');
        if (auth && (Date.now() - auth.time) < 24 * 60 * 60 * 1000) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>

</html>
